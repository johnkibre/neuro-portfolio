<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Debug Test</title>
    <style>
        body {
            background: #0a192f;
            color: #e6f1ff;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        
        .profile-header {
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            gap: 2rem !important;
            margin-bottom: 2rem !important;
            flex-wrap: wrap !important;
            border: 2px solid #0000ff !important;
            padding: 20px;
        }
        
        .profile-section {
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
            flex-shrink: 0 !important;
        }
        
        .profile-image {
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
            width: 150px !important;
            height: 150px !important;
            border-radius: 50% !important;
            border: 3px solid #64ffda !important;
            object-fit: cover !important;
            background: rgba(100, 255, 218, 0.1) !important;
        }
        
        .profile-text {
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            gap: 1rem !important;
            flex: 1 !important;
            min-width: 300px !important;
        }
        
        .hero-title {
            font-size: 2rem;
            text-align: center;
            color: #64ffda;
            border: 2px solid #00ff00 !important;
            padding: 10px;
        }
        
        .btn-test {
            display: inline-block;
            padding: 10px 20px;
            background: transparent;
            border: 1px solid #64ffda;
            color: #64ffda;
            text-decoration: none;
            border-radius: 4px;
            margin: 10px;
            cursor: pointer;
        }
        
        .btn-test:hover {
            background: rgba(100, 255, 218, 0.1);
        }
    </style>
</head>
<body>
    <h1>Profile Debug Test</h1>
    
    <div class="profile-header">
        <div class="profile-section">
            <img src="assets/images/profile.jpg?debug=1" 
                 alt="Profile Test" 
                 class="profile-image"
                 onload="console.log('✅ Profile loaded'); this.style.border='3px solid #00ff00';"
                 onerror="console.error('❌ Profile failed'); this.style.background='#ff0000';">
        </div>
        
        <div class="profile-text">
            <h1 class="hero-title">YOHANNES KIBREKIDUSAN</h1>
            <p>Hardware/Software Engineer</p>
        </div>
    </div>
    
    <h2>Button Tests</h2>
    <a href="https://github.com/johnkibre/ocr" target="_blank" class="btn-test" id="ocrBtn">
        OCR Repository →
    </a>
    
    <a href="https://github.com/johnkibre/ethiopia-tourism" target="_blank" class="btn-test">
        Tourism Project →
    </a>
    
    <div id="status" style="margin-top: 20px; padding: 10px; background: rgba(100, 255, 218, 0.1);">
        <h3>Status:</h3>
        <div id="results"></div>
    </div>
    
    <script>
        console.log('🚀 Debug test starting...');
        
        // Test profile image
        const profileImg = document.querySelector('.profile-image');
        const results = document.getElementById('results');
        
        function addResult(message, isError = false) {
            const div = document.createElement('div');
            div.style.color = isError ? '#ff6b6b' : '#64ffda';
            div.textContent = message;
            results.appendChild(div);
        }
        
        // Check profile image
        if (profileImg) {
            addResult('✅ Profile image element found');
            
            const rect = profileImg.getBoundingClientRect();
            addResult(`📍 Image dimensions: ${rect.width}x${rect.height}`);
            addResult(`👁️ Image visibility: ${getComputedStyle(profileImg).visibility}`);
            addResult(`🎭 Image opacity: ${getComputedStyle(profileImg).opacity}`);
            addResult(`📦 Image display: ${getComputedStyle(profileImg).display}`);
        } else {
            addResult('❌ Profile image element not found', true);
        }
        
        // Test OCR button
        const ocrBtn = document.getElementById('ocrBtn');
        if (ocrBtn) {
            addResult('✅ OCR button found');
            
            ocrBtn.addEventListener('click', (e) => {
                e.preventDefault();
                addResult('🔗 OCR button clicked - opening GitHub...');
                window.open('https://github.com/johnkibre/ocr', '_blank');
            });
        } else {
            addResult('❌ OCR button not found', true);
        }
        
        // Test layout
        const profileHeader = document.querySelector('.profile-header');
        if (profileHeader) {
            const headerStyle = getComputedStyle(profileHeader);
            addResult(`📦 Profile header display: ${headerStyle.display}`);
            addResult(`🔄 Profile header flex-direction: ${headerStyle.flexDirection}`);
        }
        
        setTimeout(() => {
            addResult('🏁 Debug test completed');
        }, 1000);
    </script>
</body>
</html>
